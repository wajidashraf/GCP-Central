{% include 'Form Fields' %}
{% include 'Utilities' %}
{% include 'Print Function' %}

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    :root {
        --brand: #0d6efd;
        --muted: #6b7280;
        --border: #e5e7eb;
        --indigo: #4f46e5;
        --gray-900-10: rgba(17, 24, 39, 0.1);
        --gray-300: #d1d5db;
    }

    body {
        background: #f6f7fb;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    .wrapper {
        max-width: 1100px;
        margin: 0 auto;
        padding: 1rem;
        text-align: start;
        min-height: 90vh;
    }

    .card-shell {
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, .04);
        background: #fff;
        overflow: hidden;
    }

    .header {
        background: rgba(33, 37, 41, 0.03);
        padding: 8px 0;
    }

    .page-title {
        font-weight: 700;
        letter-spacing: .02em;
        margin: 0;
        padding: 12px 16px;
        font-size: 1.25rem;
    }

    .content-wrapper {
        padding: 16px 24px 24px;
    }

    .divider {
        border-top: 1px solid var(--gray-900-10);
        margin: 8px 0 3rem;
    }

    .section-title {
        font-size: 0.875rem;
        line-height: 1.5rem;
        font-weight: 600;
        color: #111827;
    }

    .section-description {
        font-size: 0.875rem;
        line-height: 1.5rem;
        color: var(--muted);
        margin-top: 0.25rem;
    }

    .fx-checkbox {
        display: flex;
        align-items: flex-start;
        gap: 0.75rem;
    }

    .fx-checkbox input[type="checkbox"],
    .fx-checkbox input[type="radio"] {
        position: relative;
        width: 16px;
        height: 16px;
        margin-top: 2px;
        flex-shrink: 0;
        appearance: none;
        border: 1px solid var(--gray-300);
        border-radius: 0.25rem;
        background: #fff;
    }

    .fx-checkbox input[type="radio"] {
        border-radius: 50%;
    }

    .fx-checkbox input[type="checkbox"]:checked,
    .fx-checkbox input[type="radio"]:checked {
        border-color: var(--indigo);
        background: var(--indigo);
    }

    .fx-checkbox input[type="checkbox"]:checked::after {
        content: "";
        position: absolute;
        left: 4px;
        top: 1px;
        width: 4px;
        height: 8px;
        border: 2px solid #fff;
        border-top: 0;
        border-left: 0;
        transform: rotate(45deg);
    }

    .fx-checkbox input[type="radio"]:checked::after {
        content: "";
        position: absolute;
        left: 4px;
        top: 4px;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #fff;
    }

    .form-input,
    .form-textarea {
        width: 100%;
        border: 1px solid var(--gray-300);
        border-radius: 0.375rem;
        background: #fff;
        padding: 0.375rem 0.75rem;
        font-size: 0.875rem;
        line-height: 1.5rem;
        color: #111827;
        outline-offset: -1px;
        transition: outline 0.2s ease-in-out;
    }

    .placeholderColor::placeholder {
        color: #a7a8a8 !important;
        opacity: 1 !important;
    }

    .placeholderColor:-ms-input-placeholder {
        color: #a7a8a8 !important;
    }

    .placeholderColor::-webkit-input-placeholder {
        color: #a7a8a8 !important;
    }

    .form-input:focus,
    .form-textarea:focus {
        outline: 2px solid var(--indigo);
        outline-offset: -2px;
    }

    .form-textarea {
        resize: vertical;
    }

    .form-select {
        width: 100%;
        border: 1px solid var(--gray-300);
        border-radius: 0.375rem;
        background: #fff;
        padding: 0.375rem 2rem 0.375rem 0.75rem;
        font-size: 0.875rem;
        line-height: 1.5rem;
        color: #111827;
        appearance: none;
    }

    .form-select:focus {
        outline: 2px solid var(--indigo);
        outline-offset: -2px;
    }

    .select-wrapper {
        position: relative;
        display: grid;
        grid-template-columns: 1fr;
    }

    .select-arrow {
        position: absolute;
        right: 0.75rem;
        top: 50%;
        transform: translateY(-50%);
        width: 16px;
        height: 16px;
        color: var(--muted);
        pointer-events: none;
    }

    .points-container {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }

    .point-input-wrapper {
        display: flex;
        align-items: center;
        gap: 0.75rem;
    }

    .point-number {
        width: 2rem;
        text-align: right;
        font-size: 0.875rem;
        color: #111827;
        font-weight: 500;
        flex-shrink: 0;
    }

    .btn-addNewFiled {
        display: flex;
        justify-content: end;
    }

    .addnewfield {
        border: 0;
        margin-left: auto;
    }

    .btn-indigo {
        background-color: var(--indigo);
        color: #fff;
        border: none;
        border-radius: 0.375rem;
        padding: 0.5rem 0.75rem;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
    }

    .btn-indigo:hover {
        background-color: #4338ca;
    }

    .btn-secondary {
        background: #fff;
        color: #111827;
        border: 1px solid var(--gray-300);
        border-radius: 0.375rem;
        padding: 0.5rem 0.75rem;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
    }

    .space-y-4>*+* {
        margin-top: 1rem;
    }

    .col-span-full {
        grid-column: 1 / -1;
    }

    .page-title {
        font-weight: 700;
        letter-spacing: .02em;
        padding: 0;
        font-size: 1.5rem;
        color: #111827;
    }

    .button-group {
        display: flex;
        gap: 0.75rem;
        justify-content: space-between;
        margin-top: 2rem;
    }

    #loadingSpinner,
    #submissionSpinner {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 150px;
    }

    .fx-choice {
        display: flex;
        align-items: start;
        gap: 1rem;
        padding: .75rem;
        border-radius: .5rem;
        cursor: pointer;
        transition: all 0.15s ease-in-out;
        border: 1px solid transparent;
    }

    .fx-choice:hover {
        background-color: rgba(13, 110, 253, 0.05);
        border-color: rgba(13, 110, 253, 0.13);
    }

    .fx-choice:has(input[type="radio"]:checked) {
        background-color: rgb(236 240 246 / 40%)
    }

    .fx-choice input[type="radio"] {
        position: absolute;
        opacity: 0;
        width: 0;
        height: 0;
        pointer-events: none;
    }

    .fx-choice .fx-box {
        width: 20px;
        height: 20px;
        border: 2px solid var(--bs-primary);
        border-radius: .25rem;
        display: inline-block;
        position: relative;
        flex: 0 0 20px;
        transition: all 0.15s ease-in-out;
        margin-top: 2px;
    }

    .fx-choice input[type="radio"]:checked+.fx-box {
        background-color: var(--bs-primary);
        border-color: var(--bs-primary);
    }

    .fx-choice input[type="radio"]:checked+.fx-box::after {
        content: "";
        position: absolute;
        left: 5px;
        top: 2px;
        width: 6px;
        height: 10px;
        border: 2px solid #fff;
        border-top: 0;
        border-left: 0;
        transform: rotate(45deg);
    }

    .fx-code {
        width: 97px !important;
        font-weight: normal;
    }

    .fx-label {
        font-weight: normal;
    }
</style>

<div class="wrapper">
    <div class="card-shell">
        <div class="content-wrapper">
            <div class="page-title">Verify Request Data</div>
            <div class="divider"></div>

            <form id="verifyForm">
                <!-- Initial Loading Spinner -->
                <div id="loadingSpinner">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>

                <!-- Success/Error Alert -->
                <div id="alertContainer" class="d-none mb-3"></div>
                <!-- Form Container -->
                <div id="htmlContainer" class="d-none"></div>

                <!-- Submission Spinner -->
                <div id="submissionSpinner" class="d-none">
                    <div>
                        <div class="spinner-border text-primary mb-3" role="status">
                            <span class="visually-hidden">Processing...</span>
                        </div>
                        <div id="processingMessage" class="text-center text-muted"></div>
                    </div>
                </div>


                <div class="button-group" id="buttonGroup">
                    <button type="button" class="btn-secondary" id="backBtn">Back</button>
                    <button type="submit" class="btn-indigo" id="submitBtn">Submit</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', async function () {
        const container = document.getElementById('htmlContainer');
        const spinner = document.getElementById('loadingSpinner');
        const submissionSpinner = document.getElementById('submissionSpinner');
        const processingMessage = document.getElementById('processingMessage');
        const alertContainer = document.getElementById('alertContainer');
        const buttonGroup = document.getElementById('buttonGroup');
        let projectName = null, matterType = null, projectDesc = null;
        let recordCaa;
        let projectId

        // Default dropdown options
        let statusList = [
            { label: 'FR', value: 0 },
            { label: 'RS', value: 16 },
            { label: 'Ready for Engagement', value: 2 }
        ];
        const params = getRecordId();
        let verifyid = params.verifyid
        let type = params.type
        const docId = params.documentId

        async function waitForStatusUpdate(expectedStatus, retries = 10, delay = 300) {
            for (let i = 0; i < retries; i++) {
                let res = await getData(`/_api/gcp_requests?$select=gcp_requeststatus&$filter=gcp_requestid eq ${verifyid}`);

                if (res?.value?.length) {
                    let current = res.value[0].gcp_requeststatus;
                    if (Number(current) === Number(expectedStatus)) {
                        return true; // Confirmed!
                    }
                }
                await new Promise(r => setTimeout(r, delay));
            }
            return false; // Timeout (rare)
        }


        try {
            // 1️⃣ Get record ID from URL params
            if (!verifyid) throw new Error("Missing verifyid in URL.");

            // 2️⃣ Fetch current record
            let ODATA_URL = ''
            if (params.type === 1 || params.type === '1') {
                ODATA_URL = `/_api/gcp_requests?$select=gcp_requeststatus,gcp_mattertype,gcp_verifier_comment&$expand=gcp_rtprequest_Request_gcp_request($select=gcp_specialproject,gcp_projectdescription,gcp_projectname,_gcp_request_value,gcp_requesteremail)&$filter=gcp_requestid eq ${verifyid}`
            } else if (params.type === 5 || params.type === '5') {
                ODATA_URL = `/_api/gcp_requests?$select=gcp_requeststatus,gcp_mattertype,gcp_verifier_comment,gcp_verifydate&$expand=gcp_caarequest_Request_gcp_request($select=_gcp_project_value)&$filter=gcp_requestid eq ${verifyid}`
            } else {
                ODATA_URL = `/_api/gcp_requests?$select=gcp_requeststatus,gcp_mattertype,gcp_infoandcriteriaforreview,gcp_decisioncode,gcp_verifier_comment,gcp_verifydate&$filter=gcp_requestid eq ${verifyid}`;
            }

            const res = await getData(ODATA_URL);

            if (!res?.value?.length) throw new Error("Record not found.");
            const record = res.value[0];
            recordCaa = record
            let recordRTP;
            let isSpecialProject = false

            if (record?.gcp_rtprequest_Request_gcp_request?.length > 0) {
                recordRTP = record.gcp_rtprequest_Request_gcp_request[0];
                projectName = recordRTP?.gcp_projectname || null;
                projectDesc = recordRTP?.gcp_projectdescription || null;
                isSpecialProject = recordRTP.gcp_specialproject
            }
            matterType = record.gcp_mattertype || null

            const currentStatus = record.gcp_requeststatus;
            const currentComment = record.gcp_verifier_comment || "";

            if (isSpecialProject) {
                statusList.push({ label: 'W', value: 19 });
            }
            // If the current status isn't in list, add it dynamically
            if (!statusList.some(s => s.value === currentStatus)) {
                const label = record["gcp_requeststatus@OData.Community.Display.V1.FormattedValue"] || `Status ${currentStatus}`;
                statusList.push({ label, value: currentStatus });
            }
            const mt = Number(matterType);

            if ([1, 5, 10, 11, 13, 14].includes(mt)) {
                statusList = statusList.filter(status => status.value !== 2);
            }
            if ([10, 11, 13, 14].includes(mt)) {
                statusList.push({ label: 'Pending Ack', value: 9 });
            }

            if (mt === 12) {
                // Keep only FR
                statusList = statusList.filter(status => status.value === 0);

                // Ensure current status is added if not FR
                if (!statusList.some(s => s.value === currentStatus)) {
                    const label = record["gcp_requeststatus@OData.Community.Display.V1.FormattedValue"] || `Status ${currentStatus}`;
                    statusList.push({ label, value: currentStatus });
                }
            }


            // 4️⃣ Render form fields
            let html = "";
            html += createDropdownField("Request Status", statusList, false, currentStatus, "verify", "requestStatus");
            html += createMultilineField("Comment", "Enter your comment here...", false, "verify", 4, "Comment", currentComment, "");
            container.innerHTML = html;

            // Show form, hide spinner
            spinner.classList.add('d-none');
            container.classList.remove('d-none');
        } catch (err) {
            console.error("❌ Error loading record:", err);
            container.innerHTML = `<div class="alert alert-danger">Failed to load data. ${err.message}</div>`;
            spinner.classList.add('d-none');
            container.classList.remove('d-none');
        }

        // 5️⃣ Form submission handler
        const form = document.getElementById('verifyForm');

        form.addEventListener('submit', async function (e) {
            e.preventDefault();

            const status = form.querySelector('select[name="requestStatus"]').value;
            const comment = form.querySelector('textarea[name="Comment"]').value;

            if (!verifyid) {
                showAlert('danger', '❌ Missing record ID. Cannot update request.');
                return;
            }
            if (!status) {
                showAlert('warning', '⚠️ Please select a request status before submitting.');
                return;
            }

            const patchBody = {
                gcp_requeststatus: Number(status),
                gcp_verifier_comment: comment?.trim() || ""
            };

            const submitBtn = document.getElementById("submitBtn");
            submitBtn.disabled = true;

            // Hide form and buttons, show spinner
            container.classList.add('d-none');
            buttonGroup.classList.add('d-none');
            alertContainer.classList.add('d-none');
            submissionSpinner.classList.remove('d-none');
            processingMessage.textContent = "Request status is updating…";


            try {
                await updateRequestRecord(verifyid, patchBody);

                let projectCreated = false;
                let successMsg = "Request updated successfully.";

                // Check if project should be created
                if (matterType && projectName && patchBody.gcp_requeststatus == 0 && (matterType === 1 || matterType === '1')) {
                    processingMessage.textContent = "Creating project...";
                    await createProjectRecord(projectName, projectDesc, '{{user.parentcustomerid.id}}');
                    projectCreated = true;
                    successMsg = `Request updated successfully and project "${projectName}" has been created.`;
                }
                if (matterType &&
                    recordCaa.gcp_caarequest_Request_gcp_request?.[0]?.['_gcp_project_value'] &&
                    patchBody.gcp_requeststatus == 0 &&
                    (matterType === 5 || matterType === '5')) {

                    // update project Status
                    let record = {
                        gcp_projectstatus: 1
                    }
                    processingMessage.textContent = "Updating project...";
                    await updateProjectRecord(recordCaa.gcp_caarequest_Request_gcp_request[0]['_gcp_project_value'], record)
                    successMsg = 'Project updated successfully';
                }

                // 👇 Patch is done — now wait for Dataverse to actually commit status
                processingMessage.textContent = "Request status is updating…";

                await waitForStatusUpdate(patchBody.gcp_requeststatus);

                // 🚀 Once confirmed → redirect immediately (no success alert)
                window.location.href = `/request-details/?id=${verifyid}&type=${type}&documentid=${docId}`;


            } catch (err) {
                console.error("❌ Failed to update request:", err);

                // Hide spinner, show error, restore form
                submissionSpinner.classList.add('d-none');
                container.classList.remove('d-none');
                buttonGroup.classList.remove('d-none');
                showAlert('danger', 'Error: Failed to update record. Please try again.');

                submitBtn.disabled = false;
            }
        });

        // Helper function to show alerts
        function showAlert(type, message) {
            alertContainer.innerHTML = `
                <div class="alert alert-${type} alert-dismissible fade show" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            `;
            alertContainer.classList.remove('d-none');

            // Scroll to alert
            alertContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        document.getElementById('backBtn').addEventListener('click', function () {
            window.location.href = '/requests-list/';
        });
    });
</script>
